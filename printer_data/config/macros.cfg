[gcode_macro CLEAN_BED]
gcode:
  BED_MESH_PROFILE LOAD="default"
  {% set x_coordinates = [0, 43, 86, 129, 172, 215] %}

  M190 S40
  G28 X50 Y225 Z
  G4 P1000
  G0 Z0.2 F600
  {% for cord in x_coordinates %}
    G0 X{cord} F8000
    G0 Y0 F2000
    G0 X{cord-8} F2000
    G0 Y225 F8000
  {% endfor %}

  G0 Z5 F600
  G28 X

[gcode_macro M600]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    {% set L = params.L|default(50)|float %}
    {% set U = params.U|default(-50)|float %}

    SAVE_GCODE_STATE NAME=M600_state
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E{U} F1000

    {% if 'R' in params %}
        M104 S{params.R}
    {% endif %}

    PAUSE

    {% if 'S' in params %}
        {% set raw = params.S|string %}
        {% if ';' in raw %}
            {% set spool_id = raw.split(';')[0]|int %}
            CLEAR_ACTIVE_SPOOL
            SET_ACTIVE_SPOOL ID={spool_id}
        {% else %}
            {action_respond_info("M600: S parameter found but no ';' delimiter, skipping spoolman update")}
        {% endif %}
    {% endif %}

    G1 E{L} F1000      ; Load filament
    G1 E30 F1000       ; Purge old filament
    G1 E-.8 F2700      ; Fast retraction to prevent oozing
    G4 P15000          ; Wait for manual removal of purge
    RESTORE_GCODE_STATE NAME=M600_state MOVE=1
    G1 E.8 F2700

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method(
       "spoolman_set_active_spool",
       spool_id=id
    )}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method(
    "spoolman_set_active_spool",
    spool_id=None
  )}

[gcode_macro SHUTDOWN]
gcode:
    #LCDRGB R=0 G=0 B=0                               ; Turn off LCD neopixels (see above for this macro)
    #OFF                                              ; Shortcut to turn everything off (see above for this macro)
    #{action_respond_info('action:poweroff')}          ; OctoPrint compatible host shutdown
	{action_call_remote_method("shutdown_machine")}   ; Moonraker compatible host shutdown

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True